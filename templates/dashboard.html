<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Sentinel | Live Monitor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="sidebar shadow">
        <div class="sidebar-header text-center">
            <h4 class="fw-bold mb-0">BANK<span class="text-warning">SENTINEL</span></h4>
            <small class="text-muted" style="letter-spacing: 2px; font-size: 10px;">PRO LEVEL v2.1</small>
        </div>
        <div class="nav-menu">
            <a href="/dashboard" class="nav-link active"><i class="fa fa-gauge-high me-3"></i> Monitor</a>
            <a href="/reports" class="nav-link"><i class="fa fa-history me-3"></i> Audit History</a>
            <a href="/compliance" class="nav-link"><i class="fa fa-handshake-angle me-3"></i> Compliance</a>
            <a href="/settings" class="nav-link"><i class="fa fa-gear me-3"></i> Settings</a>
        </div>
        <a href="#" onclick="handleLogout()" class="nav-link logout-link mt-auto"><i class="fa fa-power-off me-3"></i> Sign Out</a>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-bold text-dark">System Surveillance</h2>
            <div class="d-flex gap-2">
                <div class="badge bg-white text-success border px-3 py-2 rounded-pill shadow-sm"><i class="fa fa-check-circle me-2"></i> ML CORE: ACTIVE</div>
                <div class="badge bg-dark text-warning border px-3 py-2 rounded-pill shadow-sm"><i class="fa fa-clock me-2"></i> LIVE FEED</div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="sentinel-card animate__animated animate__fadeInLeft">
                    <small class="text-muted text-uppercase fw-bold mb-1 d-block" style="font-size: 11px;">Risk Probability</small>
                    <h1 id="current-risk" class="display-3 fw-bold text-dark">0.000</h1>
                    <div id="risk-progress" class="progress mb-3" style="height: 6px;">
                        <div class="progress-bar bg-success" style="width: 5%"></div>
                    </div>
                    <span id="risk-status" class="badge bg-success-subtle text-success p-2 w-100">SECURE TRANSACTION</span>
                </div>
                
                <div class="sentinel-card mt-4">
                    <h6 class="fw-bold mb-3">API Manual Simulation</h6>
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-light border-0">$</span>
                        <input type="number" id="amt" class="form-control border-0 bg-light" placeholder="Deposit Amount">
                    </div>
                    <button onclick="processDeposit()" class="btn btn-dark w-100 py-3 fw-bold shadow-sm">VERIFY TRANSACTION</button>
                </div>
            </div>

            <div class="col-md-8">
                <div class="sentinel-card h-100 p-4">
                    <canvas id="riskChart" height="80"></canvas>
                </div>
            </div>

            <!-- <div class="col-md-8">
                    <div class="stat-card h-100 p-4">
                        <canvas id="riskChart" height="80"></canvas>
                    </div>
                </div> -->
        </div>

        <div class="sentinel-card mt-4 p-0 overflow-hidden shadow-sm">
            <div class="bg-dark text-white px-4 py-3 d-flex justify-content-between align-items-center">
                <h6 class="mb-0 fw-bold small">REAL-TIME TRANSACTION STREAM</h6>
                <span class="spinner-grow spinner-grow-sm text-warning"></span>
            </div>
            <div id="live-feed" style="max-height: 300px; overflow-y: auto;" class="bg-white">
                <div class="p-5 text-center text-muted">Awaiting stream from banking core...</div>
            </div>
        </div>
    </div>

    <script>
        // Chart and UI logic from your previous file but keep the IDs the same
        const ctx = document.getElementById('riskChart').getContext('2d');
        const riskChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Anomaly Trend', data: [], borderColor: '#c6a664', tension: 0.4, fill: true, backgroundColor: 'rgba(198,166,100,0.05)' }] },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
        });

        async function processDeposit() {
            const amt = document.getElementById('amt').value;
            if(!amt) return;
            const res = await fetch('/detect', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({amount: amt}) });
            const data = await res.json();
            updateUI(data, amt);
        }

        function updateUI(data, amt) {
            document.getElementById('current-risk').innerText = data.score.toFixed(3);
            const feed = document.getElementById('live-feed');
            if(feed.innerHTML.includes('Awaiting')) feed.innerHTML = '';
            
            const isAnomaly = data.status === 'Flagged';
            const statusClass = isAnomaly ? 'bg-danger-subtle text-danger' : 'bg-success-subtle text-success';
            
            feed.insertAdjacentHTML('afterbegin', `
                <div class="p-3 border-bottom d-flex justify-content-between align-items-center animate__animated animate__slideInDown">
                    <div><span class="badge ${statusClass} me-3">${data.status}</span><strong>$${amt}</strong></div>
                    <small class="text-muted">${new Date().toLocaleTimeString()}</small>
                </div>
            `);

            riskChart.data.labels.push("");
            riskChart.data.datasets[0].data.push(data.score);
            if(riskChart.data.labels.length > 12) { riskChart.data.labels.shift(); riskChart.data.datasets[0].data.shift(); }
            riskChart.update();
        }

        function handleLogout() {
            Swal.fire({ title: 'Sign Out?', text: 'Confirm secure session termination.', icon: 'warning', showCancelButton: true, confirmButtonColor: '#0a2342' }).then((r) => { if(r.isConfirmed) window.location.href='/login'; });
        }
    </script>
</body>
</html>
