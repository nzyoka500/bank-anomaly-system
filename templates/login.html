<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Sentinel | Secure Entry</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body {
            background: radial-gradient(circle at top left, #0a2342, #051324);
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-glass {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            width: 420px; padding: 3rem; color: white; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .form-control-dark {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255,255,255,0.1);
            color: white; border-radius: 12px; padding: 12px;
        }
        .form-control-dark:focus { background: rgba(255, 255, 255, 0.12); color: white; border-color: var(--bank-gold); box-shadow: none; }
        .btn-premium {
            background: var(--bank-gold); color: #fff; padding: 12px 35px;
            border-radius: 50px; font-weight: 700; border: none; transition: 0.3s;
        }
        .btn-premium:hover { background: var(--bank-blue); box-shadow: 0 10px 20px rgba(198,166,100,0.3); }

        /* style form footer */
        .login-glass a { color: rgba(255,255,255,0.5); text-decoration: none; transition: 0.3s; }
        .login-glass a:hover { color: rgba(255,255,255,0.8); }

    </style>
</head>
<body>
    <div class="login-glass text-center animate__animated animate__zoomIn">
        <h2 class="fw-bold mb-0">BANK<span class="text-warning">SENTINEL</span></h2>
        <p class="text-white-50 small mb-5">SECURE AUTHENTICATION GATEWAY</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="text-start mb-3">
                <label class="small text-white-50 fw-bold mb-2">EMPLOYEE ID</label>
                <input type="text" name="employee_id" class="form-control-dark w-100" placeholder="SENT-00-1234" required>
            </div>
            <div class="text-start mb-4">
                <label class="small text-white-50 fw-bold mb-2">ACCESS KEY</label>
                <input type="password" name="password" class="form-control-dark w-100" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-premium w-100 py-3 mt-2 shadow">INITIATE SESSION</button>
        </form>

            <div class="mt-4">
                <a href="#" class="text-white-50 small">Forgot Access Key?</a>
                <span class="mx-2 text-white-50">|</span>
                <a href="/" class="text-white-50 small"><i class="fa fa-home me-1"></i> Home</a>
            </div>
        
       
    </div>
</body>
</html>
