<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Sentinel | Secure Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        :root { --bank-blue: #0a2342; --bank-gold: #c6a664; }
        
        body { 
            background: linear-gradient(135deg, #0a2342 0%, #051324 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: 0.4s;
        }

        .login-card:hover { border-color: var(--bank-gold); }

        .brand-logo { color: white; margin-bottom: 2.5rem; text-align: center; }
        .brand-logo h2 { font-weight: 800; letter-spacing: 2px; margin-bottom: 0; }
        .brand-logo span { color: var(--bank-gold); }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--bank-gold);
            color: white;
            box-shadow: none;
        }

        .btn-login {
            background: var(--bank-gold);
            color: var(--bank-blue);
            font-weight: 700;
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 100%;
            margin-top: 1.5rem;
            transition: 0.3s;
        }

        .btn-login:hover { background: white; transform: translateY(-2px); }

        .security-badge {
            margin-top: 2rem;
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
            text-align: center;
            text-uppercase: uppercase;
            letter-spacing: 1px;
        }

        /* Loading Animation */
        .spinner-border { display: none; width: 1.2rem; height: 1.2rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">
            <h2>BANK<span>SENTINEL</span></h2>
            <small class="text-muted text-uppercase">Authorized Personnel Only</small>
        </div>

        <form id="loginForm" onsubmit="handleSignIn(event)">
            <div class="mb-3">
                <label class="text-white-50 small mb-2 text-uppercase fw-bold">Employee ID / Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 text-white-50"><i class="fa fa-user"></i></span>
                    <input type="text" class="form-control" placeholder="SENT-00-1234" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="text-white-50 small mb-2 text-uppercase fw-bold">Access Key</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 text-white-50"><i class="fa fa-lock"></i></span>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login" id="loginBtn">
                <span id="btnText">INITIATE SESSION</span>
                <div class="spinner-border" id="btnSpinner" role="status"></div>
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="text-white-50 small text-decoration-none">&larr; Back to Home</a>
        </div>

        <div class="security-badge">
            <i class="fa fa-shield-halved me-2"></i> Encrypted Terminal Alpha-6
        </div>
    </div>

    <script>
        function handleSignIn(event) {
            event.preventDefault();
            const btn = document.getElementById('loginBtn');
            const text = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');

            // Production loading simulation
            btn.disabled = true;
            text.style.display = 'none';
            spinner.style.display = 'inline-block';

            setTimeout(() => {
                window.location.href = "/dashboard"; // Redirect to Dashboard
            }, 1200);
        }
    </script>
</body>
</html>
