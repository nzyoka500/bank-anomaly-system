<!DOCTYPE html>
<html>
<head>
    <title>Bank Deposit Monitor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2>Unusual Deposit Detection System</h2>
        <div class="card p-4 mb-4">
            <h4>Analyze New Deposit</h4>
            <div class="input-group">
                <input type="number" id="amount" class="form-control" placeholder="Enter Deposit Amount">
                <button onclick="analyzeDeposit()" class="btn btn-primary">Check Transaction</button>
            </div>
        </div>

        <div id="result" class="alert d-none"></div>
    </div>

    <script>
        async function analyzeDeposit() {
            const amount = document.getElementById('amount').value;
            const response = await fetch('/detect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({amount: amount})
            });
            const result = await response.json();
            
            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('d-none', 'alert-danger', 'alert-success');
            resultDiv.classList.add(result.status === 'Flagged' ? 'alert-danger' : 'alert-success');
            resultDiv.innerText = `Result: ${result.status} (Score: ${result.score})`;
        }
    </script>
</body>
</html>
